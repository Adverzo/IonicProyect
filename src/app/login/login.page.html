<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Login</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding login-bg">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Login</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-card class="fade-in">
    <ion-card-content>
      <form (ngSubmit)="onLogin()">
        <ion-item>
          <ion-icon slot="start" name="mail-outline"></ion-icon>
          <ion-label position="floating">Email</ion-label>
          <ion-input type="email" [(ngModel)]="email" name="email" required></ion-input>
        </ion-item>

        <ion-item>
          <ion-icon slot="start" name="lock-closed-outline"></ion-icon>
          <ion-label position="floating">Password</ion-label>
          <ion-input type="password" [(ngModel)]="password" name="password" required></ion-input>
        </ion-item>

        <ion-button expand="full" type="submit" color="primary" class="ion-margin-top bounce" [disabled]="!email || !password">
          <ion-icon slot="start" name="log-in-outline"></ion-icon>
          Logearte
        </ion-button>
      </form>
      <div class="ion-text-center ion-margin-top">
        <p>¿No tienes cuenta? <a routerLink="/registro">Regístrate</a></p>
      </div>
    </ion-card-content>
  </ion-card>
  <p class="footer-note">Iniciando sesión en un entorno más verde.</p>
</ion-content>
<ion-footer>
  <ion-toolbar color="primary">
    <ion-row class="ion-align-items-center ion-justify-content-center">
      <ion-col size="auto">
        <ion-icon name="leaf-outline" size="large"></ion-icon>
      </ion-col>
      <ion-col>
        <ion-text>
          <h4>PelusasCompany</h4>
          <p>Contacto: 449 666 989</p>
        </ion-text>
      </ion-col>
    </ion-row>
  </ion-toolbar>
</ion-footer>
